{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}KhataPro{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="{% static 'favicon.ico' %}">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-gray-200 min-h-screen flex items-center justify-center px-4">

    <!-- AUTH CARD -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden">

        <!-- LOGO HEADER -->
        <div class="bg-black py-6 flex flex-col items-center">
            <img
                src="{% static 'img/logo.png' %}"
                alt="JaisTech Logo"
                class="h-14 mb-2"
            >
            <p class="text-gray-300 text-xs tracking-widest uppercase">
                Empowering Your Digital Future
            </p>
        </div>

        <!-- CONTENT -->
        <div class="p-6 sm:p-8">
            {% block content %}{% endblock %}
        </div>

        <!-- FOOTER -->
        <div class="bg-gray-50 text-center py-3 text-xs text-gray-500">
            © {% now "Y" %} JaisTech · All rights reserved
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>

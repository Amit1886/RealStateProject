{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Complete Your Profile</h2>
  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label>Name:</label>
      <input type="text" name="name" class="form-control"
             value="{{ kha_profile.name }}" 
             {% if kha_profile.name %}readonly{% endif %}>
    </div>

    <div class="mb-3">
      <label>Mobile:</label>
      <input type="text" name="mobile" class="form-control"
             value="{{ acc_profile.mobile }}" 
             {% if acc_profile.mobile %}readonly{% endif %}>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}

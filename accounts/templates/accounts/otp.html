{% extends "accounts/base.html" %}
{% load static %}

{% block title %}Verify OTP{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">
    <h1 class="text-2xl font-bold text-center mb-6">Verify OTP</h1>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}

      <div>
        <label for="id_code" class="block text-sm font-medium text-gray-700">Enter OTP</label>
        {{ form.code }}
      </div>

      <button type="submit"
        class="w-full py-2 px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Verify
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600">
      Didnt receive OTP? <a href="#" class="text-blue-600 font-medium hover:underline">Resend</a>
    </p>
  </div>
</div>
{% endblock %}

{% extends "demo_center/base.html" %}
{% block content %}
  <div class="grid">
    <div class="card span-12">
      <h3>Accounting Demo Output</h3>
      <div class="sub">Mini P&L summary (dummy data).</div>
    </div>
    <div class="card span-3"><h3>Sales</h3><div class="value">₹{{ state.accounting.sales }}</div></div>
    <div class="card span-3"><h3>GST</h3><div class="value">₹{{ state.accounting.gst }}</div></div>
    <div class="card span-3"><h3>Expenses</h3><div class="value">₹{{ state.accounting.expenses }}</div></div>
    <div class="card span-3"><h3>Net Profit</h3><div class="value">₹{{ state.accounting.net_profit }}</div></div>
  </div>
{% endblock %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Center</title>
    <style>
      :root { --bg:#0b1220; --card:#111a2e; --muted:#9fb0d0; --text:#e7efff; --accent:#2b5cff; --ok:#1db954; --bad:#ff4d4f; }
      body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
      a { color: var(--text); text-decoration:none; }
      header { display:flex; gap:12px; align-items:center; padding:14px 18px; border-bottom:1px solid #1c2a4a; position:sticky; top:0; background:rgba(11,18,32,.95); backdrop-filter: blur(6px); }
      header .brand { font-weight:700; }
      nav { display:flex; gap:10px; flex-wrap:wrap; }
      nav a { padding:8px 10px; border-radius:10px; background:#0f1730; border:1px solid #1c2a4a; }
      nav a:hover { border-color:#2b5cff; }
      .wrap { max-width:1100px; margin:0 auto; padding:18px; }
      .grid { display:grid; grid-template-columns: repeat(12, 1fr); gap:12px; }
      .card { background:var(--card); border:1px solid #1c2a4a; border-radius:14px; padding:14px; }
      .card h3 { margin:0 0 8px; font-size:14px; color:var(--muted); font-weight:600; }
      .value { font-size:24px; font-weight:800; }
      .sub { color:var(--muted); font-size:12px; }
      .btn { cursor:pointer; display:inline-flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; border:1px solid #1c2a4a; background:#0f1730; color:var(--text); }
      .btn:hover { border-color: var(--accent); }
      .toggle { display:flex; justify-content:space-between; align-items:center; padding:10px; border:1px solid #1c2a4a; border-radius:12px; margin:8px 0; }
      .pill { padding:4px 10px; border-radius:999px; font-weight:700; font-size:12px; }
      .on { background: rgba(29,185,84,.15); color: var(--ok); border:1px solid rgba(29,185,84,.35); }
      .off { background: rgba(255,77,79,.12); color: var(--bad); border:1px solid rgba(255,77,79,.25); }
      .span-12 { grid-column: span 12; }
      .span-6 { grid-column: span 6; }
      .span-4 { grid-column: span 4; }
      .span-3 { grid-column: span 3; }
      .span-8 { grid-column: span 8; }
      .span-5 { grid-column: span 5; }
      .span-7 { grid-column: span 7; }
      .span-2 { grid-column: span 2; }
      @media (max-width: 900px){ .span-6,.span-5,.span-7,.span-8 { grid-column: span 12; } .span-4{grid-column: span 6;} .span-3{grid-column: span 6;} }
      @media (max-width: 520px){ .span-4,.span-3{grid-column: span 12;} }
      code { background:#0f1730; border:1px solid #1c2a4a; padding:2px 6px; border-radius:8px; }
      ul { margin:8px 0 0; }
      li { margin:6px 0; color: var(--muted); }
      .timeline { display:flex; flex-direction:column; gap:10px; }
      .titem { display:flex; justify-content:space-between; padding:10px; border:1px dashed #2a3c64; border-radius:12px; }
      .titem b { color: var(--text); }
      .log { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; background:#0f1730; border:1px solid #1c2a4a; border-radius:12px; padding:10px; white-space:pre-wrap; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <header>
      <div class="brand">Addons • Demo Center</div>
      <nav>
        <a href="{% url 'demo_center:index' %}">Home</a>
        <a href="{% url 'demo_center:admin_dashboard' %}">Admin</a>
        <a href="{% url 'demo_center:user_experience' %}">User</a>
        <a href="{% url 'demo_center:marketing_ads' %}">Marketing+Ads</a>
        <a href="{% url 'demo_center:courier_transport' %}">Courier+Transport</a>
        <a href="{% url 'demo_center:accounting' %}">Accounting</a>
        <a href="{% url 'demo_center:hr' %}">HR</a>
        <a href="{% url 'demo_center:autopilot_logs' %}">Autopilot Logs</a>
        <a href="{% url 'demo_center:how_it_works' %}">Guide</a>
      </nav>
      <form method="post" action="{% url 'demo_center:reset' %}" style="margin-left:auto;">
        {% csrf_token %}
        <button class="btn" type="submit">Reset Demo</button>
      </form>
    </header>
    <div class="wrap">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>

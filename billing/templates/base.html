<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KhataPro{% endblock %}</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Optional: Add Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100 font-sans">

<!-- ------------------- NAVBAR ------------------- -->
<nav class="bg-white shadow p-4 flex justify-between items-center">
  <div class="flex items-center space-x-4">
    <a href="{% url 'dashboard' %}" class="text-xl font-bold text-blue-600">KhataPro</a>
  </div>

  <div class="flex items-center space-x-4">
    <span class="text-gray-700">Hello, {{ request.user.username }}</span>
    <a href="{% url 'logout' %}" class="text-red-600 hover:underline">Logout</a>
  </div>
</nav>

<!-- ------------------- MAIN CONTENT ------------------- -->
<div class="flex">

  <!-- ------------------- SIDEBAR ------------------- -->
  <aside class="w-64 bg-white shadow p-4 hidden md:block">
    <ul class="space-y-2">
      <li><a href="{% url 'billing:choose_plan' %}" class="block p-2 rounded hover:bg-blue-50">Subscription</a></li>
    </ul>
  </aside>

  <!-- ------------------- PAGE CONTENT ------------------- -->
  <main class="flex-1 p-6">
    {% if messages %}
      <div class="space-y-2 mb-4">
        {% for message in messages %}
          <div class="p-2 rounded
                      {% if message.tags == 'success' %} bg-green-100 text-green-800
                      {% elif message.tags == 'warning' %} bg-yellow-100 text-yellow-800
                      {% elif message.tags == 'error' %} bg-red-100 text-red-800
                      {% else %} bg-blue-100 text-blue-800 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}
    <!-- Page-specific content will appear here -->
    {% endblock %}
  </main>

</div>

<!-- ------------------- FOOTER ------------------- -->
<footer class="bg-white text-gray-500 text-center p-4 mt-6 shadow">
  &copy; {{ now.year }} KhataPro. All rights reserved.
</footer>

</body>
</html>

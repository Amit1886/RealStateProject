{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Add Chat Thread</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="title" class="form-label">Thread Title</label>
            <input type="text" class="form-control" id="title" name="title" placeholder="Enter chat thread title">
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
{% endblock %}

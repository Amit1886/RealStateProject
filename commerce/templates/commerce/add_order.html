{% extends "base.html" %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'css/add_order.css' %}">
<script src="{% static 'libs/html5-qrcode.min.js' %}"></script>
<script src="{% static 'js/add_order.js' %}" defer></script>
<script src="{% static 'js/add_order_search.js' %}" defer></script>

<div class="container-fluid py-4">
  <div class="card shadow-lg border-0 order-card">

    <!-- HEADER -->
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0">🚀 Smart Order System</h4>
      <span class="badge bg-light text-primary">AI Ready</span>
    </div>

    <form method="POST" action="{% url 'commerce:add_order' %}">
      {% csrf_token %}

      <div class="card-body">

        <!-- ORDER BASIC INFO -->
        <div class="row g-3 mb-3">

          <div class="col-md-4">
            <label for="orderType" class="form-label">Order Type</label>
            <select id="orderType" name="order_type" class="form-select" required title="Order Type">
              <option value="">Select</option>
              <option value="sale">Sale</option>
              <option value="purchase">Purchase</option>
            </select>
          </div>

          <div class="col-md-8">
            <label for="partySelect" class="form-label">Party</label>
            <input type="text" id="partySearch" class="form-control mb-1" placeholder="🔍 Search Party">
            <select id="partySelect" name="party" class="form-select" required title="Select Party">
              <option value="">Select Party</option>
              {% for p in parties %}
              <option value="{{ p.id }}">{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>

        </div>

        <!-- SCAN BAR -->
        <div class="scan-section mb-4 text-center">
          <button type="button" id="startScan" class="btn btn-outline-primary px-4">
            📷 Scan Barcode / QR
          </button>
          <div id="scanner" class="mt-3"></div>
        </div>

        <!-- ITEMS TABLE -->
        <div class="table-responsive">
          <table class="table table-bordered align-middle" id="orderTable">
            <thead class="table-primary text-center">
              <tr>
                <th>Product</th>
                <th width="80">Qty</th>
                <th width="120">Price</th>
                <th width="140">Amount</th>
                <th width="60"></th>
              </tr>
            </thead>

            <tbody id="orderBody">
              <tr class="item-row">
                <td>
                  <input type="text" class="form-control product-search mb-1" placeholder="Search Product">
                  <select name="product[]" class="form-select product" required title="Select Product">
                    <option value="">Select</option>
                    {% for prod in products %}
                    <option value="{{ prod.id }}" data-price="{{ prod.price }}">
                      {{ prod.name }}
                    </option>
                    {% endfor %}
                  </select>
                </td>

                <td>
                  <input type="number" name="qty[]" class="form-control qty text-center" value="1" min="1" aria-label="Quantity">
                </td>

                <td>
                  <input type="number" name="price[]" class="form-control price text-end" step="0.01" aria-label="Price">
                </td>

                <td>
                  <input type="number" name="amount[]" class="form-control amount text-end" readonly aria-label="Amount">
                </td>

                <td class="text-center">
                  <button type="button" class="btn btn-sm btn-danger remove-btn">✕</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <button type="button" id="addRow" class="btn btn-outline-primary mb-3">
          ➕ Add Item
        </button>

        <!-- SUMMARY -->
        <div class="row justify-content-end">
          <div class="col-md-5">
            <div class="card summary-card">
              <div class="card-body">
                <p class="d-flex justify-content-between">
                  <span>Subtotal</span>
                  <strong>₹ <span id="subTotal">0.00</span></strong>
                </p>
                <p class="d-flex justify-content-between">
                  <span>GST</span>
                  <strong>₹ <span id="tax">0.00</span></strong>
                </p>
                <hr>
                <h5 class="d-flex justify-content-between text-primary">
                  <span>Grand Total</span>
                  <span>₹ <span id="grandTotal">0.00</span></span>
                </h5>
              </div>
            </div>
          </div>
        </div>

        <!-- NOTES -->
        <div class="mt-3">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3" placeholder="Additional notes..."></textarea>
        </div>

      </div>

      <!-- FOOTER ACTIONS -->
      <div class="card-footer bg-light d-flex flex-wrap gap-2 justify-content-between">

        <button type="submit" class="btn btn-success px-4">
          💾 Save Order
        </button>

        <div class="d-flex gap-2">
          <button type="button" onclick="window.print()" class="btn btn-secondary">🖨 Print</button>
          <button type="button" id="downloadPDF" class="btn btn-danger">⬇ PDF</button>
          <button type="button" class="btn btn-success">📤 WhatsApp</button>
          <button type="button" class="btn btn-warning">📩 SMS</button>
        </div>

      </div>

    </form>
  </div>
</div>

{% endblock %}

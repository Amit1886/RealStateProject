{% extends "base.html" %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'css/add_order.css' %}">
<script src="{% static 'js/add_order.js' %}" defer></script>

<div class="order-wrapper">

    <div class="header-flex">
        <h2 class="order-title">Create New Order</h2>

        <!-- Shortcuts Panel -->
        <div class="shortcut-box">
            <h5>Shortcuts</h5>
            <ul>
                <li><b>Alt + A</b> – Add Item</li>
                <li><b>Ctrl + Enter</b> – Save Order</li>
                <li><b>Ctrl + P</b> – Print</li>
                <li><b>Ctrl + D</b> – Download PDF</li>
            </ul>
        </div>
    </div>

    <form method="POST" action="{% url 'commerce:add_order' %}">
        {% csrf_token %}

        <!-- ORDER TYPE -->
        <label><b>Order Type</b></label>
        <select name="order_type" class="form-control" required>
            <option value="">-- Select --</option>
            <option value="sale">Sale</option>
            <option value="purchase">Purchase</option>
        </select>

        <!-- PARTY SEARCH -->
        <label class="mt-3"><b>Select Party (Searchable)</b></label>
        <input type="text" id="partySearch" class="form-control mb-2" placeholder="Search Party...">

        <select name="party" id="partySelect" class="form-control" required>
            <option value="">-- Select Party --</option>
            {% for p in parties %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>

        <hr>

        <h5><b>Order Items</b></h5>

        <table class="table table-bordered" id="itemsTable">
            <thead class="table-light">
                <tr>
                    <th>Product</th>
                    <th style="width: 10%">Qty</th>
                    <th style="width: 15%">Price</th>
                    <th style="width: 18%">Amount</th>
                    <th style="width: 10%">Action</th>
                </tr>
            </thead>
            <tbody id="orderBody">
                <tr class="item-row">
                    <td>
                        <input type="text" class="form-control product-search" placeholder="Search product...">
                        <select name="product[]" class="form-control product mt-1" required>
                            <option value="">Select</option>
                            {% for prod in products %}
                            <option value="{{ prod.id }}" data-price="{{ prod.price }}">{{ prod.name }}</option>
                            {% endfor %}
                        </select>
                    </td>

                    <td><input type="number" name="qty[]" class="form-control qty" value="1" min="1"></td>
                    <td><input type="number" name="price[]" class="form-control price" step="0.01"></td>
                    <td><input type="number" name="amount[]" class="form-control amount" readonly></td>

                    <td><button type="button" class="remove-btn">✕</button></td>
                </tr>
            </tbody>
        </table>

        <button type="button" id="addItem" class="add-btn">+ Add Item (Alt + A)</button>

        <div class="total-box" id="totalBox">Total: ₹0.00</div>

        <label class="mt-3"><b>Notes</b></label>
        <textarea name="notes" class="form-control" rows="3"></textarea>

        <button type="submit" class="btn btn-success w-100 mt-3" id="saveBtn">
            Save Order (Ctrl + Enter)
        </button>

        <div class="mt-3 print-download-box">
            <button type="button" class="btn btn-secondary" id="printBtn">Print (Ctrl + P)</button>
            <button type="button" class="btn btn-danger" id="downloadPdfBtn">Download PDF (Ctrl + D)</button>
        </div>

    </form>
</div>

{% endblock %}

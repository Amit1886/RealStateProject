{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
  body {
    background: linear-gradient(135deg, #004aad, #007bff);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
  }

  .payment-card {
    background: #ffffff;
    border-radius: 1.5rem;
    padding: 2.2rem;
    box-shadow: 0 15px 35px rgba(0, 0, 60, 0.25);
    transition: all 0.3s ease;
    max-width: 650px;
    margin: 3rem auto;
  }

  .payment-card:hover {
    transform: translateY(-5px);
  }

  .section-title {
    font-weight: 700;
    color: #004aad;
    border-bottom: 3px solid #007bff;
    display: inline-block;
    margin-bottom: 1.5rem;
  }

  label {
    font-weight: 600;
    color: #0d3a6a;
    display: block;
    margin-bottom: 6px;
  }

  .form-control, select, textarea, input {
    border: 1.8px solid #004aad !important;
    border-radius: 0.8rem !important;
    padding: 0.7rem 1rem;
    font-size: 0.95rem;
    color: #212529;
    background-color: #fff;
    width: 100%;
    transition: border-color 0.2s ease;
  }

  .form-control:focus, select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: #007bff !important;
    box-shadow: 0 0 0 3px rgba(13,110,253,0.25);
  }

  .btn-gradient {
    background: linear-gradient(45deg, #004aad, #00bcd4);
    color: #fff;
    border: none;
    border-radius: 2rem;
    padding: 0.8rem 1.6rem;
    font-weight: 600;
    font-size: 1rem;
    width: 100%;
    transition: 0.3s ease;
  }

  .btn-gradient:hover {
    background: linear-gradient(45deg, #003380, #0097b2);
  }

  .btn-outline-secondary {
    border: 2px solid #004aad;
    color: #004aad;
    background: #fff;
    transition: 0.3s ease;
  }

  .btn-outline-secondary:hover {
    background: #004aad;
    color: #fff;
  }

  .success-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: #ffffff;
    padding: 25px 35px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    text-align: center;
    z-index: 9999;
    opacity: 0;
    transition: all 0.4s ease;
  }

  .success-popup.active {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .success-popup .checkmark {
    font-size: 3rem;
    color: #16a34a;
    animation: pop 0.6s ease forwards;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1.2); opacity: 1; }
  }

  .success-popup p {
    font-weight: 600;
    color: #065f46;
    margin-top: 10px;
    font-size: 1.1rem;
  }

  @media (max-width: 576px) {
    .payment-card {
      padding: 1.5rem;
      border-radius: 1rem;
      margin: 1.5rem;
    }
    .section-title {
      font-size: 1.2rem;
    }
  }
</style>

<div class="container py-4">
  <div class="payment-card">
    <h3 class="section-title mb-4">
      <i class="bi bi-cash-stack me-2"></i> 💰 Add Payment
    </h3>

    <form method="POST" id="paymentForm">
      {% csrf_token %}

      <!-- Select Invoice -->
      <div class="mb-3">
        <label for="invoice_id">Select Invoice</label>
        <select name="invoice_id" id="invoice_id" class="form-control" required>
          <option value="">-- Select Invoice --</option>
          {% for inv in invoices %}
            <option value="{{ inv.id }}">
              Invoice #{{ inv.number }} — ₹{{ inv.amount }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Amount -->
      <div class="mb-3">
        <label for="amount">Amount (₹)</label>
        <input type="number" step="0.01" id="amount" name="amount" class="form-control" placeholder="Enter amount" required>
      </div>

      <!-- Payment Mode -->
      <div class="mb-3">
        <label for="mode">Payment Mode</label>
        <select name="mode" id="mode" class="form-control" required>
          <option value="">-- Select Mode --</option>
          <option value="Cash">Cash</option>
          <option value="Online">Online</option>
          <option value="UPI">UPI</option>
          <option value="Paytm">Paytm</option>
        </select>
      </div>

      <!-- Reference -->
      <div class="mb-3">
        <label for="reference">Reference No.</label>
        <input type="text" id="reference" name="reference" class="form-control" placeholder="e.g. TXN123456 / UPI Ref ID">
      </div>

      <!-- Note -->
      <div class="mb-3">
        <label for="note">Note (Optional)</label>
        <textarea id="note" name="note" class="form-control" rows="3" placeholder="Enter any note..."></textarea>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-gradient mt-3">
        ✅ Add Payment
      </button>
    </form>

    <!-- Back Button -->
    <div class="text-center mt-4">
      <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary px-4 rounded-pill fw-semibold">
        ← Back to Dashboard
      </a>
    </div>
  </div>
</div>

<!-- ✅ Success Popup -->
<div id="successPopup" class="success-popup">
  <div class="checkmark">✅</div>
  <p>Payment Added Successfully!</p>
</div>

<script>
  const paymentForm = document.getElementById("paymentForm");
  const successPopup = document.getElementById("successPopup");

  paymentForm.addEventListener("submit", function (e) {
    e.preventDefault();

    setTimeout(() => {
      successPopup.classList.add("active");

      setTimeout(() => {
        successPopup.classList.remove("active");
        paymentForm.submit(); // Proceed with actual submission
      }, 1500);
    }, 400);
  });
</script>
{% endblock %}

{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_order.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid py-4">
  <div class="card shadow-lg border-0 order-card">

    <!-- HEADER -->
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0">💰 Smart Payment System</h4>
      <span class="badge bg-light text-primary">AI Ready</span>
    </div>

    <form method="POST" id="paymentForm">
      {% csrf_token %}

      <div class="card-body">

        <!-- SCAN BAR -->
        <div class="scan-section mb-4 text-center">
          <button type="button" id="startScan" class="btn btn-outline-primary px-4">
            📷 Scan Invoice QR
          </button>
          <div id="scanner" class="mt-3"></div>
        </div>

        <!-- PAYMENT FORM -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <div class="card">
              <div class="card-body">
                <label for="invoice_id" class="form-label">Select Invoice</label>
                <select name="invoice_id" id="invoice_id" class="form-select" required>
                  <option value="">-- Select Invoice --</option>
                  {% for inv in invoices %}
                    <option value="{{ inv.id }}">
                      Invoice #{{ inv.number }} — ₹{{ inv.amount }}
                    </option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card">
              <div class="card-body">
                <label for="amount" class="form-label">Amount (₹)</label>
                <input type="number" step="0.01" id="amount" name="amount" class="form-control" placeholder="Enter amount" required>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <div class="card">
              <div class="card-body">
                <label for="mode" class="form-label">Payment Mode</label>
                <select name="mode" id="mode" class="form-select" required>
                  <option value="">-- Select Mode --</option>
                  <option value="Cash">💵 Cash</option>
                  <option value="Online">💳 Online</option>
                  <option value="UPI">📱 UPI</option>
                  <option value="Paytm">💰 Paytm</option>
                </select>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card">
              <div class="card-body">
                <label for="reference" class="form-label">Reference No.</label>
                <input type="text" id="reference" name="reference" class="form-control" placeholder="e.g. TXN123456 / UPI Ref ID">
              </div>
            </div>
          </div>
        </div>

        <!-- NOTES -->
        <div class="mt-3">
          <label for="note" class="form-label">Note (Optional)</label>
          <textarea id="note" name="note" class="form-control" rows="3" placeholder="Enter any note..."></textarea>
        </div>

      </div>

      <!-- FOOTER ACTIONS -->
      <div class="card-footer bg-light d-flex flex-wrap gap-2 justify-content-between">

        <button type="submit" class="btn btn-success px-4">
          💾 Save Payment
        </button>

        <div class="d-flex gap-2">
          <button type="button" onclick="window.print()" class="btn btn-secondary">🖨 Print</button>
          <button type="button" id="downloadPDF" class="btn btn-danger">⬇ PDF</button>
          <button type="button" class="btn btn-success">📤 WhatsApp</button>
          <button type="button" class="btn btn-warning">📩 SMS</button>
        </div>

      </div>

    </form>
  </div>
</div>

<!-- ✅ Success Popup -->
<div id="successPopup" class="success-popup">
  <div class="checkmark">✅</div>
  <p>Payment Added Successfully!</p>
</div>

<script src="{% static 'libs/html5-qrcode.min.js' %}"></script>
<script>
  const paymentForm = document.getElementById("paymentForm");
  const successPopup = document.getElementById("successPopup");

  paymentForm.addEventListener("submit", function (e) {
    e.preventDefault();

    setTimeout(() => {
      successPopup.classList.add("active");

      setTimeout(() => {
        successPopup.classList.remove("active");
        paymentForm.submit(); // Proceed with actual submission
      }, 1500);
    }, 400);
  });

  // QR Code Scanner
  let scanner = null;
  document.getElementById('startScan').addEventListener('click', function() {
    const scannerDiv = document.getElementById('scanner');
    if (scanner) {
      scanner.clear();
      scannerDiv.innerHTML = '';
      scanner = null;
      this.textContent = '📷 Scan Invoice QR';
      return;
    }

    scanner = new Html5QrcodeScanner('scanner', {
      fps: 10,
      qrbox: {width: 250, height: 250}
    });

    scanner.render(function(decodedText) {
      // Parse QR code data and auto-fill invoice
      console.log('QR Code detected:', decodedText);
      // Add logic to parse QR and select invoice
      scanner.clear();
      scannerDiv.innerHTML = '';
      scanner = null;
      document.getElementById('startScan').textContent = '📷 Scan Invoice QR';
    });

    this.textContent = '⏹ Stop Scan';
  });
</script>

{% endblock %}

{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_order.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid py-4">
  <div class="card shadow-lg border-0 order-card">

    <!-- HEADER -->
    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0"> Smart Product Manager</h4>
      <span class="badge bg-light text-info">AI Ready</span>
    </div>

    <div class="card-body">

      {% if messages %}
        <div class="mb-4">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <!-- PRODUCT FORM -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <label for="category" class="form-label">Category</label>
              <select name="category" id="category" required class="form-select">
                <option value="">-- Select Category --</option>
                {% for cat in categories %}
                  <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <label for="name" class="form-label">Product Name</label>
              <input type="text" name="name" id="name" required class="form-control" placeholder="Enter product name">
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <label for="price" class="form-label">Price ()</label>
              <input type="number" name="price" id="price" step="0.01" required class="form-control" placeholder="0.00">
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <label for="stock" class="form-label">Stock Quantity</label>
              <input type="number" name="stock" id="stock" min="0" class="form-control" placeholder="0">
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <label for="sku" class="form-label">SKU</label>
              <input type="text" name="sku" id="sku" required class="form-control" placeholder="Enter SKU">
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <label for="unit" class="form-label">Unit</label>
              <input type="text" name="unit" id="unit" value="pcs" class="form-control" placeholder="pcs/kg/ltr">
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <label for="hsn_code" class="form-label">HSN Code</label>
              <input type="text" name="hsn_code" id="hsn_code" class="form-control" placeholder="Enter HSN code">
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <label for="gst_rate" class="form-label">GST Rate (%)</label>
              <input type="number" name="gst_rate" id="gst_rate" step="0.01" value="0.0" class="form-control" placeholder="0.0">
            </div>
          </div>
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div class="card">
        <div class="card-body">
          <label for="description" class="form-label">Description</label>
          <textarea name="description" id="description" rows="3" class="form-control" placeholder="Enter product description"></textarea>
        </div>
      </div>

    </div>

    <!-- FOOTER ACTIONS -->
    <div class="card-footer bg-light d-flex flex-wrap gap-2 justify-content-between">
      <div class="d-flex gap-2">
        <button type="submit" form="productForm" class="btn btn-info px-4">
           Add Product
        </button>
        <a href="{% url 'commerce:add_category' %}" class="btn btn-outline-success">
           Add Category
        </a>
      </div>

      <div class="d-flex gap-2">
        <button type="button" onclick="window.print()" class="btn btn-secondary" aria-label="Print product details"> Print</button>
        <button type="button" id="downloadPDF" class="btn btn-danger" aria-label="Download PDF"> PDF</button>
        <button type="button" class="btn btn-success" aria-label="Share via WhatsApp"> WhatsApp</button>
        <button type="button" class="btn btn-warning" aria-label="Send SMS"> SMS</button>
      </div>
    </div>

  </div>
</div>

<form id="productForm" method="POST" style="display: none;">
  {% csrf_token %}
  <input type="text" name="category" id="hiddenCategory">
  <input type="text" name="name" id="hiddenName">
  <input type="text" name="price" id="hiddenPrice">
  <input type="text" name="stock" id="hiddenStock">
  <input type="text" name="sku" id="hiddenSku">
  <input type="text" name="unit" id="hiddenUnit">
  <input type="text" name="hsn_code" id="hiddenHsnCode">
  <input type="text" name="gst_rate" id="hiddenGstRate">
  <textarea name="description" id="hiddenDescription"></textarea>
</form>

<script>
  // Sync form inputs to hidden form
  const fields = ['category', 'name', 'price', 'stock', 'sku', 'unit', 'hsn_code', 'gst_rate', 'description'];
  fields.forEach(field => {
    const input = document.getElementById(field);
    if (input) {
      input.addEventListener('input', function() {
        document.getElementById('hidden' + field.charAt(0).toUpperCase() + field.slice(1)).value = this.value;
      });
    }
  });
</script>

{% endblock %}

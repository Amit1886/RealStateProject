{% extends "base.html" %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center p-6">
  <div class="bg-white shadow-2xl rounded-2xl w-full max-w-md p-8 border-t-4 border-indigo-600">

    {% if messages %}
      <div class="mb-4">
        {% for message in messages %}
          <div
            class="p-3 mb-2 rounded-lg text-white font-semibold
                   {% if message.tags == 'success' %}bg-green-500
                   {% elif message.tags == 'error' %}bg-red-500
                   {% else %}bg-indigo-500{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">🛒 Add New Product</h2>

    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Category</label>
        <select
          name="category"
          required
          class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"
        >
          <option value="">-- Select Category --</option>
          {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Product Name</label>
        <input type="text" name="name" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"/>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Price (₹)</label>
        <input type="number" name="price" step="0.01" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"/>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Stock Quantity</label>
        <input type="number" name="stock" min="0" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"/>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">SKU</label>
        <input type="text" name="sku" required class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"/>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Unit</label>
        <input type="text" name="unit" value="pcs" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"/>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">HSN Code</label>
        <input type="text" name="hsn_code" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"/>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">GST Rate (%)</label>
        <input type="number" name="gst_rate" step="0.01" value="0.0" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"/>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Description</label>
        <textarea name="description" rows="3" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-400 outline-none transition"></textarea>
      </div>

      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition">
        ➕ Add Product
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="{% url 'commerce:add_category' %}" class="inline-block text-indigo-600 font-semibold hover:text-indigo-800 transition">
        ➕ Add New Category
      </a>
    </div>

  </div>
</div>

{% endblock %}

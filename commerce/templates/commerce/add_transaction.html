{% extends 'base.html' %}
{% block content %}
<h2 style="margin-bottom:15px; color:#333;">➕ Add Transaction</h2>

<!-- ✅ Messages Modern Style -->
{% if messages %}
  <div style="margin-bottom:15px;">
    {% for message in messages %}
      <div style="
        padding:12px 16px;
        border-radius:8px;
        font-size:14px;
        margin-bottom:10px;
        {% if message.tags == 'success' %}
          background:#e8fff3;
          border:1px solid #28a745;
          color:#155724;
        {% elif message.tags == 'error' %}
          background:#fff0f0;
          border:1px solid #dc3545;
          color:#721c24;
        {% else %}
          background:#eef5ff;
          border:1px solid #007bff;
          color:#004085;
        {% endif %}
      ">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}

<form method="post" style="max-width:550px; background:#fff; padding:25px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08);">
  {% csrf_token %}

  <label for="party"><b>Party:</b></label>
  <select name="party" id="party" required 
          style="width:100%; padding:10px; margin:8px 0 15px; border-radius:6px; border:1px solid #ccc; font-size:14px;">
    <option value="">-- Select Party --</option>
    {% for party in parties %}
      <option value="{{ party.id }}">{{ party.name }}</option>
    {% endfor %}
  </select>

  <label for="txn_type"><b>Transaction Type:</b></label>
  <select name="txn_type" id="txn_type" required 
          style="width:100%; padding:10px; margin:8px 0 15px; border-radius:6px; border:1px solid #ccc; font-size:14px;">
    <option value="credit">Credit</option>
    <option value="debit">Debit</option>
  </select>

  <label for="amount"><b>Amount:</b></label>
  <input type="number" name="amount" id="amount" required 
         style="width:100%; padding:10px; margin:8px 0 15px; border-radius:6px; border:1px solid #ccc; font-size:14px;">
  
  <!-- ✅ Modern Date Picker -->
  <label for="date"><b>Transaction Date:</b></label>
  <input type="date" name="date" id="date" required 
         style="width:100%; padding:10px; margin:8px 0 15px; border-radius:6px; border:1px solid #ccc; font-size:14px;">
  
  <label for="notes"><b>Notes:</b></label>
  <textarea name="notes" id="notes" rows="3"
            style="width:100%; padding:10px; margin:8px 0 20px; border-radius:6px; border:1px solid #ccc; font-size:14px;"></textarea>

  <button type="submit" 
          style="background:#007bff; color:white; padding:12px 18px; border:none; border-radius:6px; cursor:pointer; font-size:15px; transition:0.3s;">
    💾 Save Transaction
  </button>
</form>
{% endblock %}

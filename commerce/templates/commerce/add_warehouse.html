{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Warehouse | Commerce</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #007bff, #6610f2);
            margin: 0;
            padding: 0;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 95%;
            max-width: 420px;
            background: #fff;
            padding: 30px 25px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            color: #007bff;
            margin-bottom: 20px;
            font-weight: 600;
        }

        label {
            display: block;
            font-weight: bold;
            text-align: left;
            margin-bottom: 8px;
            color: #444;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            width: 100%;
            background: #007bff;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        /*  Message Notification Styles */
        .messages {
            margin-bottom: 15px;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-weight: 500;
            text-align: center;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        /*  Dashboard Button */
        .dashboard-btn {
            display: inline-block;
            margin-top: 10px;
            background: #28a745;
            color: #fff;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .dashboard-btn:hover {
            background: #218838;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }

            h2 {
                font-size: 20px;
            }

            button, .dashboard-btn {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2> Add New Warehouse</h2>

    <!--  Django Message Display -->
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Warehouse Name:</label>
        <input type="text" name="name" placeholder="Enter warehouse name" required>

        <label>Location:</label>
        <input type="text" name="location" placeholder="Enter location (optional)">

        <button type="submit">Add Warehouse</button>
    </form>
      <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary px-4 rounded-pill"> Back to Dashboard</a>

    </div>

</body>
</html>

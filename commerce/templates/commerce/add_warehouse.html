{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add_order.css' %}">
{% endblock %}

{% block content %}
<div class="container-fluid py-4 unified-screen busy-unified-add">
  <div class="card shadow-lg border-0 order-card" id="mainWarehouseCard">
    <div class="card-header bg-gradient-primary text-white d-flex justify-content-between align-items-center flex-wrap">
      <div class="d-flex align-items-center gap-3">
        <h2 class="mb-0 fw-bold text-shadow">Add Warehouse</h2>
        <span class="badge bg-warning text-dark fw-bold pulse-badge">Inventory</span>
      </div>
    </div>

    <div class="card-body">
      {% if messages %}
      <div class="mb-4">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" class="row g-3">
        {% csrf_token %}

        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <label class="form-label">Warehouse Name</label>
              <input type="text" class="form-control" name="name" placeholder="Enter warehouse name" required>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card">
            <div class="card-body">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" name="location" placeholder="Enter location (optional)">
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <label class="form-label">Capacity (Units)</label>
              <input type="number" class="form-control" name="capacity" min="0" placeholder="0">
            </div>
          </div>
        </div>

        <div class="col-12 d-flex justify-content-end gap-2">
          <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary btn-lg fw-bold">Back</a>
          <button type="submit" class="btn btn-success btn-lg fw-bold">Add Warehouse</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

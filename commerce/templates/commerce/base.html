{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}KhataPro{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'commerce/css/style.css' %}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'commerce:user_dashboard' %}">KhataPro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <!-- Dashboard -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:party_list' %}">Dashboard</a>
                    </li>

                    <!-- Parties -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:party_list' %}">Parties</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:add_party' %}">Add Party</a>
                    </li>

                    <!-- Transactions -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:transaction_list' %}">Transactions List</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:add_transaction' %}">Add Transaction</a>
                    </li>

                    <!-- Products -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:product_list' %}">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:product_create' %}">Add Product</a>
                    </li>

                    <!-- Warehouses -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:warehouse_list' %}">Warehouses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:warehouse_create' %}">Add Warehouse</a>
                    </li>

                    <!-- Orders -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:order_list' %}">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:order_create_user' %}">New Order</a>
                    </li>

                    <!-- Reports -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'commerce:reports' %}">Reports</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Main container -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Chat Room  {{ party.name }}</h3>

    <!-- Messages List -->
    <div id="chat-box" class="border p-3 mb-3" style="height: 400px; overflow-y: auto;">
        {% for msg in messages %}
            <div class="mb-2">
                <strong>{{ msg.sender }}:</strong>
                <span>{{ msg.text }}</span>
                {% if msg.attachment %}
                    <a href="{{ msg.attachment.url }}" target="_blank"> Attachment</a>
                {% endif %}
                <small class="text-muted">({{ msg.timestamp|date:"H:i" }})</small>
            </div>
        {% endfor %}
    </div>

    <!-- Chat Form -->
    <form id="chat-form" enctype="multipart/form-data">
        <div class="input-group">
            <input type="text" name="text" id="chat-text" class="form-control" placeholder="Type your message...">
            <input type="file" name="attachment" id="chat-file" class="form-control" style="max-width: 200px;">
            <button class="btn btn-primary" type="submit">Send</button>
        </div>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const chatForm = document.getElementById("chat-form");
    const chatBox = document.getElementById("chat-box");
    const chatText = document.getElementById("chat-text");
    const chatFile = document.getElementById("chat-file");

    chatForm.addEventListener("submit", function(e) {
        e.preventDefault();

        let formData = new FormData();
        formData.append("text", chatText.value);
        if (chatFile.files.length > 0) {
            formData.append("attachment", chatFile.files[0]);
        }

        fetch("{% url 'api_chat_send' party.id %}", {
            method: "POST",
            body: formData,
            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }

            // Append new message
            let newMsg = document.createElement("div");
            newMsg.classList.add("mb-2");
            newMsg.innerHTML = `<strong>${data.sender}:</strong> ${data.text}
                ${data.attachment ? `<a href="${data.attachment}" target="_blank"> Attachment</a>` : ""}
                <small class="text-muted">(${data.timestamp})</small>`;
            chatBox.appendChild(newMsg);

            chatBox.scrollTop = chatBox.scrollHeight; // auto scroll
            chatText.value = "";
            chatFile.value = "";
        })
        .catch(err => console.error("Chat send error:", err));
    });
});
</script>
{% endblock %}

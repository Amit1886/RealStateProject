{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <h2 class="text-primary mb-3">🛍 Commerce Dashboard</h2>

  {% if not is_paid %}
  <div class="alert alert-warning">
    You are on a <strong>Free Plan</strong>. Upgrade to manage products and warehouses.
  </div>
  {% endif %}

  <div class="row g-4">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h5 class="card-title text-success">Warehouses</h5>
          <p>Total: {{ warehouses|length }}</p>
          <a href="{% url 'commerce:warehouse_list' %}" class="btn btn-outline-success btn-sm">View All</a>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h5 class="card-title text-info">Products</h5>
          <p>Total: {{ products|length }}</p>
          <a href="{% url 'commerce:product_list' %}" class="btn btn-outline-info btn-sm">View All</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

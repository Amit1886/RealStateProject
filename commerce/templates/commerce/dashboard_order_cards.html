<div class="wa-dashboard-wrap" data-owner="{{ request.user.id }}">
  <div class="wa-dashboard-header">
    <div>
      <h3>WhatsApp Orders</h3>
      <p>Live orders captured from WhatsApp messages.</p>
    </div>
    <a href="{% url 'commerce:whatsapp_order_inbox' %}" class="summary-modern-btn">
      Open Inbox
    </a>
  </div>

  <div class="wa-cards-grid">
    <div class="wa-card">
      <div class="wa-card-label">Orders Today</div>
      <div class="wa-card-value" data-wa="total_orders">0</div>
      <div class="wa-card-meta">Auto-updated every 10s</div>
    </div>
    <div class="wa-card">
      <div class="wa-card-label">WhatsApp Sales</div>
      <div class="wa-card-value" data-wa="total_sales">Rs. 0</div>
      <div class="wa-card-meta">Todays total</div>
    </div>
    <div class="wa-card">
      <div class="wa-card-label">Latest Order</div>
      <div class="wa-card-value" data-wa="latest_order">-</div>
      <div class="wa-card-meta">Tap to open details</div>
    </div>
  </div>

  <div class="wa-slider">
    <div class="wa-slide-track">
      <div class="wa-slide">
        <div class="wa-slide-label">WhatsApp Orders Today</div>
        <div class="wa-slide-value" data-wa="slide_orders">0</div>
      </div>
      <div class="wa-slide">
        <div class="wa-slide-label">Total WhatsApp Sales</div>
        <div class="wa-slide-value" data-wa="slide_sales">Rs. 0</div>
      </div>
      <div class="wa-slide">
        <div class="wa-slide-label">Latest Order</div>
        <div class="wa-slide-value" data-wa="slide_latest">-</div>
      </div>
    </div>
    <div class="wa-slider-controls">
      <button type="button" class="wa-slider-btn" data-dir="-1">Prev</button>
      <button type="button" class="wa-slider-btn" data-dir="1">Next</button>
    </div>
  </div>

  <div class="wa-order-list">
    <div class="wa-list-head">Latest Orders</div>
    <div class="wa-list-body" data-wa="order_list">
      <div class="wa-empty">No orders yet.</div>
    </div>
  </div>
</div>

<style>
.wa-dashboard-wrap {
  margin: 18px 0;
  background: linear-gradient(135deg, #fefce8 0%, #f0fdf4 100%);
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 18px;
}
body.dark .wa-dashboard-wrap {
  background: linear-gradient(135deg, #0f172a 0%, #0b1220 100%);
  border-color: #1f2937;
}
.wa-dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.wa-dashboard-header h3 {
  margin: 0;
  font-size: 20px;
}
.wa-dashboard-header p {
  margin: 4px 0 0 0;
  font-size: 12px;
  color: #6b7280;
}
.wa-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.wa-card {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
}
body.dark .wa-card {
  background: #0b1220;
  border-color: #1f2937;
  color: #e5e7eb;
}
.wa-card-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #6b7280;
}
.wa-card-value {
  font-size: 22px;
  font-weight: 700;
  margin-top: 6px;
}
.wa-card-meta {
  font-size: 11px;
  color: #6b7280;
}
.wa-slider {
  margin-top: 14px;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  overflow: hidden;
}
body.dark .wa-slider {
  background: #0b1220;
  border-color: #1f2937;
}
.wa-slide-track {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 100%;
  transition: transform 0.4s ease;
}
.wa-slide {
  padding: 14px 16px;
}
.wa-slide-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #6b7280;
  margin-bottom: 6px;
}
.wa-slide-value {
  font-size: 22px;
  font-weight: 700;
  color: #15803d;
}
.wa-slider-controls {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px 12px;
  border-top: 1px solid #e5e7eb;
}
.wa-slider-btn {
  background: transparent;
  border: 1px solid #e5e7eb;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
}
.wa-order-list {
  margin-top: 12px;
}
.wa-list-head {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #6b7280;
  margin-bottom: 6px;
}
.wa-list-row {
  display: grid;
  grid-template-columns: 120px 1fr 120px 120px;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 12px;
}
.wa-order-btn {
  background: #0f766e;
  color: #ffffff;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}
.wa-empty {
  font-size: 12px;
  color: #6b7280;
  padding: 6px 0;
}
@media (max-width: 720px) {
  .wa-list-row {
    grid-template-columns: 1fr;
  }
}
</style>

<script>
(function () {
  const wrap = document.querySelector('.wa-dashboard-wrap');
  if (!wrap) return;

  const track = wrap.querySelector('.wa-slide-track');
  let slideIndex = 0;

  function formatCurrency(value) {
    return 'Rs. ' + Number(value || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  }

  function setText(selector, value) {
    const el = wrap.querySelector(selector);
    if (el) el.textContent = value;
  }

  function renderOrders(orders) {
    const container = wrap.querySelector('[data-wa="order_list"]');
    if (!container) return;
    if (!orders || orders.length === 0) {
      container.innerHTML = '<div class="wa-empty">No orders yet.</div>';
      return;
    }
    container.innerHTML = orders.map(o => `
      <div class="wa-list-row">
        <button class="wa-order-btn" onclick="window.location.href='/commerce/orders/sales/${o.id}/'">${o.order_no}</button>
        <div>${o.customer_name}</div>
        <div>${o.mobile || '-'}</div>
        <div>${formatCurrency(o.total)}</div>
      </div>
    `).join('');
  }

  function fetchLive() {
    fetch('/api/orders/live-feed/')
      .then(res => res.json())
      .then(data => {
        setText('[data-wa="total_orders"]', data.total_orders_today || 0);
        setText('[data-wa="total_sales"]', formatCurrency(data.total_sales_today || 0));
        if (data.latest_orders && data.latest_orders[0]) {
          setText('[data-wa="latest_order"]', data.latest_orders[0].order_no);
          setText('[data-wa="slide_latest"]', data.latest_orders[0].order_no);
        }
        setText('[data-wa="slide_orders"]', data.total_orders_today || 0);
        setText('[data-wa="slide_sales"]', formatCurrency(data.total_sales_today || 0));
        renderOrders(data.latest_orders || []);
      })
      .catch(() => {
        setText('[data-wa="total_orders"]', '');
        setText('[data-wa="total_sales"]', '');
      });
  }

  function moveSlide(dir) {
    const slides = track ? track.children.length : 0;
    if (!slides) return;
    slideIndex = (slideIndex + dir + slides) % slides;
    track.style.transform = `translateX(-${slideIndex * 100}%)`;
  }

  wrap.querySelectorAll('.wa-slider-btn').forEach(btn => {
    btn.addEventListener('click', () => moveSlide(parseInt(btn.dataset.dir || '1', 10)));
  });

  fetchLive();
  setInterval(fetchLive, 10000);
})();
</script>

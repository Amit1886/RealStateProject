{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container mt-4" style="max-width:600px;">
  <div class="card shadow rounded-4">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0"> Create New Order</h5>
    </div>

    <div class="card-body">

      {% if messages %}
        {% for message in messages %}
          <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'commerce:order_action' %}">
        {% csrf_token %}

        <!-- Customer -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Customer</label>
          <select name="customer" class="form-control" required>
            <option value="">-- Select Customer --</option>
            {% for c in customers %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Product -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Product</label>
          <select name="product" class="form-control" required id="productSelect">
            <option value="">-- Select Product --</option>
            {% for p in products %}
              <option value="{{ p.id }}" data-price="{{ p.price }}">
                {{ p.name }} ({{ p.price }})
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Quantity -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Quantity</label>
          <input type="number" name="quantity" min="1" value="1" class="form-control" required>
        </div>

        <!-- Price -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Price</label>
          <input type="number" step="0.01" name="price" class="form-control" id="priceInput" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-success fw-semibold">
             Create Order
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const productSelect = document.getElementById("productSelect");
  const priceInput = document.getElementById("priceInput");

  productSelect.addEventListener("change", function () {
    const option = this.options[this.selectedIndex];
    const price = option.getAttribute("data-price");
    if (price) {
      priceInput.value = price;
    }
  });
});
</script>

{% endblock %}

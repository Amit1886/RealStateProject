{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Add New Party</h2>
    <a href="{% url 'commerce:party_list' %}" class="btn btn-secondary mb-3">⬅ Back to Parties</a>

    <!-- Show messages if any -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}

        <div class="mb-3">
            <label for="id_name" class="form-label">Party Name</label>
            <input type="text" name="name" id="id_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="id_mobile" class="form-label">Mobile</label>
            <input type="text" name="mobile" id="id_mobile" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" name="email" id="id_email" class="form-control">
        </div>

        <div class="mb-3">
            <label for="id_party_type" class="form-label">Party Type</label>
            <select name="party_type" id="id_party_type" class="form-select" required>
                <option value="">-- Select Type --</option>
                <option value="customer">Customer</option>
                <option value="vendor">Vendor</option>
                <option value="supplier">Supplier</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="id_address" class="form-label">Address</label>
            <textarea name="address" id="id_address" rows="3" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label for="id_gst" class="form-label">GST Number</label>
            <input type="text" name="gst" id="id_gst" class="form-control">
        </div>

        <button type="Submit" class="btn btn-success">Save Party</button>
        <a href="{% url 'commerce:party_list' %}" class="btn btn-danger">Cancel</a>
    </form>
</div>
{% endblock %}

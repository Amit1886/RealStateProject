{% extends "commerce/base.html" %}
{% block title %}Portal Chat{% endblock %}

{% block content %}
<h3>Chat Room - {{ portal.party.name }}</h3>
<div id="chatBox" style="height:300px; overflow-y:scroll; border:1px solid #ccc; padding:10px;">
    {% for msg in messages %}
    <p><strong>{{ msg.user.username if msg.user else 'Guest' }}:</strong> {{ msg.text }}</p>
    {% endfor %}
</div>

<form id="chatForm" class="mt-2">
    {% csrf_token %}
    <div class="input-group">
        <input type="text" id="chatText" name="text" class="form-control" placeholder="Type message...">
        <button class="btn btn-primary">Send</button>
    </div>
</form>

<a href="{% url 'commerce:portal_home' portal.token %}" class="btn btn-secondary mt-3">Back to Portal Home</a>

<script>
const chatForm = document.getElementById('chatForm');
const chatBox = document.getElementById('chatBox');
chatForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const response = await fetch("{% url 'commerce:portal_api_send' portal.token %}", {
        method: "POST",
        body: formData,
        headers: {'X-CSRFToken': '{{ csrf_token }}'}
    });
    const data = await response.json();
    if (data.status === "success") {
        chatBox.innerHTML += `<p><strong>You:</strong> ${data.message}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        chatForm.reset();
    }
});
</script>
{% endblock %}

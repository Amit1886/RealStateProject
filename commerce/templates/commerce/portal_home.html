{% extends "commerce/base.html" %}
{% block title %}Portal Home{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h3>Welcome to {{ portal.party.name }} Portal</h3>
        <p>Use the navigation below to access products, place orders, or chat.</p>

        <a href="{% url 'commerce:portal_products' portal.token %}" class="btn btn-primary">View Products</a>
        <a href="{% url 'commerce:portal_place_order' portal.token %}" class="btn btn-success">Place Order</a>
        <a href="{% url 'commerce:portal_chat_room' portal.token %}" class="btn btn-info">Chat</a>
    </div>
</div>
{% endblock %}

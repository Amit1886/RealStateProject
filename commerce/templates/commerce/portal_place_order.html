{% extends "commerce/base.html" %}
{% block title %}Place Order{% endblock %}

{% block content %}
<h3>Place Order for {{ portal.party.name }}</h3>
<form method="POST" id="orderForm">
    {% csrf_token %}
    <div class="mb-3">
        <label for="product_id" class="form-label">Product</label>
        <select id="product_id" name="product_id" class="form-select">
            {% for product in portal.party.product_set.all %}
            <option value="{{ product.id }}">{{ product.name }} (₹{{ product.price }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="qty" class="form-label">Quantity</label>
        <input type="number" name="qty" id="qty" class="form-control" value="1" min="1">
    </div>
    <button type="submit" class="btn btn-success">Place Order</button>
</form>

<div id="orderMessage" class="mt-3"></div>

<a href="{% url 'commerce:portal_home' portal.token %}" class="btn btn-secondary mt-3">Back to Portal Home</a>

<script>
document.getElementById('orderForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const response = await fetch("{% url 'commerce:portal_place_order' portal.token %}", {
        method: "POST",
        body: formData,
        headers: {'X-CSRFToken': '{{ csrf_token }}'}
    });
    const data = await response.json();
    document.getElementById('orderMessage').innerText = data.status === "success" ? "Order Placed! ID: " + data.order_id : "Error placing order";
});
</script>
{% endblock %}

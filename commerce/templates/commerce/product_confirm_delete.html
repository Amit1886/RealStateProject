{% extends "base.html" %}
{% load static %}

{% block title %}Delete Product - {{ product.name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 py-10">
  <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md text-center">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">
      Are you sure you want to delete this product?
    </h2>

    <div class="border-t border-gray-200 pt-4">
      <p class="text-lg text-gray-700 mb-6">
        <strong>{{ product.name }}</strong><br>
        <span class="text-gray-500 text-sm">Price: {{ product.price }}</span>
      </p>

      <form method="POST">
        {% csrf_token %}
        <div class="flex justify-center gap-4">
          <button type="submit" class="bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-700 transition">
            Yes, Delete
          </button>
          <a href="{% url 'commerce:product_list' %}"
             class="bg-gray-300 text-gray-800 px-5 py-2 rounded-lg hover:bg-gray-400 transition">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}

<style>
  .delete-card {
    max-width: 480px;
    margin: 60px auto;
    padding: 30px;
    background: #fff5f5;
    border: 1px solid #fecaca;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    text-align: center;
  }
  .delete-card h2 {
    color: #b91c1c;
    font-weight: 700;
  }
  .delete-card p {
    color: #7f1d1d;
    margin: 15px 0 25px;
  }
  .delete-card button {
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    margin: 5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-danger {
    background: #dc2626;
    color: white;
  }
  .btn-danger:hover {
    background: #b91c1c;
  }
  .btn-cancel {
    background: #f3f4f6;
    color: #111827;
  }
  .btn-cancel:hover {
    background: #e5e7eb;
  }
</style>

<div class="delete-card">
  <h2> Confirm Delete</h2>
  <p>Are you sure you want to delete warehouse <strong>{{ warehouse.name }}</strong>?</p>
  
  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Yes, Delete</button>
    <a href="{% url 'commerce:warehouse_list' %}" class="btn-cancel">Cancel</a>
  </form>
</div>

{% endblock %}

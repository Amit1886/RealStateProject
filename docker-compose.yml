version: '3.9'

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    command: celery -A khatapro worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.example
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    command: celery -A khatapro beat -l info
    volumes:
      - .:/app
    env_file:
      - .env.example
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: universal_saas
      POSTGRES_USER: universal
      POSTGRES_PASSWORD: universal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:

version: '3.9'

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      WA_GATEWAY_BASE_URL: http://whatsapp_gateway_node:3100
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_ENABLED: "true"
    depends_on:
      - db
      - redis
      - redpanda
      - whatsapp_gateway_node

  celery_worker:
    build: .
    command: celery -A khatapro worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      WA_GATEWAY_BASE_URL: http://whatsapp_gateway_node:3100
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_ENABLED: "true"
    depends_on:
      - db
      - redis
      - redpanda

  celery_beat:
    build: .
    command: celery -A khatapro beat -l info
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      WA_GATEWAY_BASE_URL: http://whatsapp_gateway_node:3100
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_ENABLED: "true"
    depends_on:
      - db
      - redis
      - redpanda

  fastapi_service:
    build: .
    command: uvicorn fastapi_service.main:app --host 0.0.0.0 --port 9000
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    env_file:
      - .env.example
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_ENABLED: "true"
    depends_on:
      - db
      - redpanda
    restart: unless-stopped

  # WhatsApp Node gateway (WPPConnect) used for QR login + media webhooks
  whatsapp_gateway_node:
    image: node:20
    working_dir: /app/whatsapp_gateway
    command: sh -c "npm ci && npm run start"
    volumes:
      - .:/app
    ports:
      - "3100:3100"
    env_file:
      - .env.example
    restart: unless-stopped

  # Kafka-compatible single-binary (recommended for production)
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://redpanda:9092"
      - --pandaproxy-addr
      - "0.0.0.0:8082"
      - --advertise-pandaproxy-addr
      - "redpanda:8082"
    ports:
      - "9092:9092"
      - "8082:8082"
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: universal_saas
      POSTGRES_USER: universal
      POSTGRES_PASSWORD: universal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>KhataPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, Segoe UI, Arial;
      margin: 40px;
      background: #f8f9fa;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 24px;
      max-width: 720px;
      margin: auto;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
    }
    .btn-primary {
      background: #007bff;
      color: #fff;
    }
    .btn-primary:hover {
      background: #0056b3;
    }
    .alert {
      border: 1px solid #ffc107;
      background: #fff3cd;
      color: #856404;
      padding: 16px;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>KhataPro is Live ✅</h1>
    <p>Go to <a href="/admin/">Admin</a> to manage Parties and Transactions.</p>

    {% if user.is_authenticated %}
      {% if not user.userprofile.is_completed %}
        <div class="alert">
          ⚠️ Your profile is incomplete.<br>
          <a href="{% url 'complete_profile' %}" class="btn btn-primary">Complete Your Profile</a>
        </div>
      {% endif %}
    {% endif %}
  </div>
</body>
</html>

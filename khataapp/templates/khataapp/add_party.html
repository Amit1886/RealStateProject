{% extends 'base.html' %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'css/party.css' %}">
<script src="{% static 'js/party.js' %}"></script>

<div class="party-container">
  <div class="party-card">

    <div class="party-header">
      <span>Add / Manage Party</span>
      <div>
        <a href="{% url 'khataapp:add_party' %}" class="btn-sm-light">Add New</a>
        <a href="{% url 'khataapp:party_list' %}" class="btn-sm-light">View All</a>
      </div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="party-form">
      {% csrf_token %}
      <div class="row">

        <!-- LEFT COLUMN -->
        <div class="col-md-6">
          <label>Name *</label>
          <input type="text" name="name" required>

          <label>Mobile</label>
          <input type="text" name="mobile">

          <label>Email</label>
          <input type="email" name="email">

          <label>Aadhaar No (optional)</label>
          <input type="text" name="aadhaar">

          <label>PAN No (optional)</label>
          <input type="text" name="pan">

          <label>Opening Balance</label>
          <input type="number" step="0.01" name="opening_balance">

          <label>Opening Balance Type</label>
          <select name="opening_type">
            <option value="debit">Debit</option>
            <option value="credit">Credit</option>
          </select>

          <label>Address</label>
          <textarea name="address" rows="3"></textarea>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="col-md-6">

          <label>Party Type *</label>
          <select name="party_type" required>
            <option value="customer">Customer</option>
            <option value="supplier">Supplier</option>
          </select>

          <label>PIN Code</label>
          <input type="text" name="pin" id="pin" onkeyup="findPin()" maxlength="6">

          <label>State</label>
          <select name="state" id="state"></select>

          <label>District</label>
          <select name="district" id="district"></select>

          <h5 class="section-title">Payment Details</h5>

          <label>UPI ID</label>
          <input type="text" name="upi_id">

          <label>Bank Account Number</label>
          <input type="text" name="bank_account_number">

          <label>WhatsApp Number</label>
          <input type="text" name="whatsapp_number">

          <label>SMS Number</label>
          <input type="text" name="sms_number">

          <label>QR Code (optional)</label>
          <input type="file" name="qr_code" accept="image/*">
        </div>
      </div>

      <div class="btn-center">
        <button type="submit" class="btn-primary-big">Save Party</button>
      </div>

    </form>

  </div>
</div>

{% endblock %}

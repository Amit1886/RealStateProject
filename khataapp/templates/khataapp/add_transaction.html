{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="container py-4">
  <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 720px;">
    
    <div class="card-header bg-primary text-white text-center rounded-top-4 py-3">
      <h4 class="mb-0">Add / Edit Transaction</h4>
    </div>

    <div class="card-body p-4">
      <form method="POST" enctype="multipart/form-data" id="txnForm">
        {% csrf_token %}

        <!-- Party -->
        <div class="mb-3">
          <label class="form-label fw-bold">Select Party *</label>
          <select name="party" class="form-select" required autofocus>
            {% for p in parties %}
              <option value="{{ p.id }}">{{ p.name }} ({{ p.party_type|title }})</option>
            {% endfor %}
          </select>
        </div>

        <!-- Transaction Type -->
        <div class="mb-3">
          <label class="form-label fw-bold">Transaction Type *</label>
          <select name="txn_type" class="form-select" required>
            <option value="credit">Credit (+)</option>
            <option value="debit">Debit (-)</option>
          </select>
        </div>

        <!-- Transaction Mode -->
        <div class="mb-3">
          <label class="form-label fw-bold">Transaction Mode *</label>
          <select name="txn_mode" class="form-select" required>
            <option value="cash">Cash</option>
            <option value="upi">UPI</option>
            <option value="wallet">Wallet</option>
            <option value="bank_transfer">Bank Transfer</option>
            <option value="cheque">Cheque</option>
            <option value="card">Credit/Debit Card</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Amount -->
        <div class="mb-3">
          <label class="form-label fw-bold">Amount *</label>
          <input type="number" step="0.01" name="amount" class="form-control" required placeholder="Enter amount">
        </div>

        <!-- Date -->
        <div class="mb-3">
          <label class="form-label fw-bold">Date (Optional)</label>
          <input type="date" name="date" class="form-control">
        </div>

        <!-- Voucher Selection -->
        <div class="mb-3">
          <label class="form-label fw-bold">Voucher (Optional)</label>
          <select name="voucher" class="form-select">
            <option value="">No Voucher</option>
            {% for v in vouchers %}
            <option value="{{ v.id }}">{{ v.voucher_no }} - {{ v.voucher_type }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Invoice Selection -->
        <div class="mb-3">
          <label class="form-label fw-bold">Invoice (Optional)</label>
          <select name="invoice" class="form-select">
            <option value="">No Invoice</option>
            {% for inv in invoices %}
            <option value="{{ inv.id }}">Invoice #{{ inv.invoice_no }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- GST Option -->
        <div class="mb-3">
          <label class="form-label fw-bold">GST Type (Optional)</label>
          <select name="gst_type" class="form-select">
            <option value="">Select GST Option</option>
            <option value="gst">GST (With Tax)</option>
            <option value="non_gst">Non-GST (No Tax)</option>
          </select>
        </div>

        <!-- Notes -->
        <div class="mb-3">
          <label class="form-label fw-bold">Notes</label>
          <textarea name="notes" class="form-control" rows="2" placeholder="Add details"></textarea>
        </div>

        <!-- File Upload -->
        <div class="mb-3">
          <label class="form-label fw-bold">Upload Receipt (Optional)</label>
          <input type="file" name="receipt" class="form-control">
        </div>

        <!-- Save Button -->
        <button type="submit" class="btn btn-success w-100 fw-bold">
          Save Transaction
        </button>

      </form>
    </div>

    <div class="card-footer text-center bg-light rounded-bottom-4">
      <a href="{% url 'khataapp:transaction_list' %}" class="btn btn-outline-primary btn-sm fw-bold me-2">
        View Transactions
      </a>
      <a href="{% url 'khataapp:add_transaction' %}" class="btn btn-outline-success btn-sm fw-bold">
        Add New
      </a>
    </div>
  </div>
</div>

<!-- Keyboard Shortcuts -->
<script>
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        if(!e.target.closest("textarea")){
            e.preventDefault();
            document.getElementById("txnForm").submit();
        }
    }
    if(e.key === "Escape"){
        window.location.href = "{% url 'khataapp:transaction_list' %}";
    }
});
</script>

{% endblock %}

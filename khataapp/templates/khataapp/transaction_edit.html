{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/transaction_edit.css' %}">
{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="card txn-edit-card">
        <div class="card-header txn-edit-header">
            <h4>Edit Transaction</h4>
            <a href="{% url 'khataapp:transaction_view' txn.id %}" class="btn btn-back">
                 Back
            </a>
        </div>

        <div class="card-body">

            <form method="post" class="txn-form">
                {% csrf_token %}

                <div class="form-grid">

                    <div class="form-group">
                        <label>Party</label>
                        <select name="party" class="form-control" required>
                            {% for p in parties %}
                                <option value="{{ p.id }}"
                                  {% if p.id == txn.party.id %}selected{% endif %}>
                                    {{ p.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Transaction Type</label>
                        <select name="txn_type" class="form-control" required>
                            <option value="credit" {% if txn.txn_type == "credit" %}selected{% endif %}>Credit</option>
                            <option value="debit" {% if txn.txn_type == "debit" %}selected{% endif %}>Debit</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" step="0.01" name="amount"
                               value="{{ txn.amount }}" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date"
                               value="{{ txn.date|date:'Y-m-d' }}"
                               class="form-control" required>
                    </div>

                    <div class="form-group full">
                        <label>Notes</label>
                        <textarea name="notes" rows="4"
                                  class="form-control">{{ txn.notes }}</textarea>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-save">
                         Update Transaction
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/transaction_edit.js' %}"></script>
{% endblock %}

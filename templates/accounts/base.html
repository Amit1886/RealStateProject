<!-- templates/accounts/base.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Khata Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="{% url 'accounts:dashboard' %}" class="font-bold text-xl">KhataPro</a>
      <div>
        {% if request.user.is_authenticated %}
          <span class="mr-4">Hi, {{ request.user.username }}</span>
          <a class="px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-700 transition" href="{% url 'accounts:logout' %}">Logout</a>
        {% else %}
          <a class="px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-700 transition" href="{% url 'accounts:login' %}">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 max-w-6xl mx-auto p-4 w-full">
    {% if messages %}
      {% for message in messages %}
        <div class="my-2 px-4 py-3 rounded 
                    {% if message.tags == 'error' %}bg-red-100 text-red-800
                    {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800
                    {% elif message.tags == 'success' %}bg-green-100 text-green-800
                    {% else %}bg-blue-100 text-blue-800{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white shadow mt-auto py-4 text-center text-gray-500 text-sm">
    &copy; {{ now|date:"Y" }} KhataPro. All rights reserved.
  </footer>

</body>
</html>

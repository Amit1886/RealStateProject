{% extends "accounts/base.html" %}
{% load widget_tweaks %}
{% block title %}Verify OTP{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
  <h1 class="text-2xl font-bold mb-4 text-center">Enter OTP</h1>

  {% if messages %}
    <div class="mb-4">
      {% for message in messages %}
        <p class="text-sm {% if message.tags == 'error' %}text-red-500{% elif message.tags == 'success' %}text-green-500{% endif %}">
          {{ message }}
        </p>
      {% endfor %}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-4">
      <input type="text" name="code" placeholder="Enter OTP" class="border p-2 w-full rounded" required>
    </div>

    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 transition">
      Verify
    </button>
  </form>
</div>
{% endblock %}

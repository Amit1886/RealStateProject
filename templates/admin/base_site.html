{% extends "admin/base.html" %}
{% load i18n %}

{% block branding %}
  <h1 id="site-name">
    <a href="{% url 'admin:index' %}">{{ site_header|default:_('Django administration') }}</a>
  </h1>
{% endblock %}

{% block nav-global %}

      <a href="/superadmin/core_settings/desktoprelease/desktop-logs/">Desktop Logs</a>
    </div>
  {% endif %}
{% endblock %}

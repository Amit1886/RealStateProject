<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>{% block title %}Commerce{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://unpkg.com/mvp.css"/>
  {% load static %}
  <style>
    .row { display:flex; gap:16px; flex-wrap:wrap }
    .card { padding:16px; border:1px solid #ddd; border-radius:12px; }
    .right { float:right }
    textarea { width:100% }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="{% url 'commerce:dashboard' %}">Dashboard</a>
    <a href="{% url 'commerce:product_list' %}">Products</a>
    <a href="{% url 'commerce:warehouse_list' %}">Warehouses</a>
    <a href="{% url 'commerce:order_list' %}">Orders</a>
    <a href="/accounts/logout/">Logout</a>
  </nav>
</header>

<main>
  {% for message in messages %}
    <div class="card">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>

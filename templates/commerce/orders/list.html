{% extends "commerce/base.html" %}
{% block content %}
<h2>Orders <a class="right" href="{% url 'commerce:order_create_user' %}">+ New Order</a></h2>
<form method="get">
  <label>Status:
    <select name="status" onchange="this.form.submit()">
      <option value="">--all--</option>
      {% for s,v in [('pending','pending'),('accepted','accepted'),('rejected','rejected'),('fulfilled','fulfilled')] %}
        <option value="{{ s }}" {% if request.GET.status == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </label>
</form>
<table>
  <thead><tr><th>#</th><th>Party</th><th>Status</th><th>Total</th><th>When</th></tr></thead>
  <tbody>
    {% for o in orders %}
      <tr>
        <td><a href="{% url 'commerce:order_detail' o.id %}">#{{ o.id }}</a></td>
        <td>{{ o.party.name }}</td>
        <td>{{ o.status }}</td>
        <td>₹{{ o.total_amount }}</td>
        <td>{{ o.created_at }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="5">No orders</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

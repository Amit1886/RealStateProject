{% extends "commerce/base.html" %}
{% block content %}
<h2>Chat with Store</h2>
<div id="chatbox" style="border:1px solid #ddd; padding:10px; height:300px; overflow:auto;"></div>
<form id="sendForm">
  {% csrf_token %}
  <textarea name="text" rows="2" placeholder="Type message..."></textarea>
  <button>Send</button>
</form>
<script>
let lastTs = "";
function fetchMsgs(){
  fetch("{% url 'commerce:portal_api_messages' portal.token %}?after="+encodeURIComponent(lastTs))
    .then(r=>r.json()).then(d=>{
      const box=document.getElementById('chatbox');
      d.messages.forEach(m=>{
        const div=document.createElement('div');
        div.textContent = `[${m.created_at}] ${m.sent_by}: ${m.text}`;
        box.appendChild(div);
        lastTs = m.created_at;
      });
      box.scrollTop = box.scrollHeight;
    });
}
setInterval(fetchMsgs, 3000); fetchMsgs();

document.getElementById('sendForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  fetch("{% url 'commerce:portal_api_send' portal.token %}", {method:"POST", body:fd})
    .then(r=>r.json()).then(d=>{ if(d.ok){ e.target.reset(); fetchMsgs(); }});
});
</script>
{% endblock %}

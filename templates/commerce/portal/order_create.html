{% extends "commerce/base.html" %}
{% block content %}
<h2>Place Order - {{ party.name }}</h2>
<form method="post">
  {% csrf_token %}
  <div id="items"></div>
  <p><button type="button" onclick="addItem()">+ Add Item</button></p>
  <p><button>Place Order</button></p>
</form>
<script>
let idx=1;
const products = [{% for pr in products %}{id:{{pr.id}}, name:"{{ pr.name|escapejs }}", price:"{{ pr.price }}"},{% endfor %}]
function addItem(){
  const p = document.createElement('div');
  p.innerHTML = `
    <p>
      <select name="item_product_${idx}">
        ${products.map(x=>`<option value="${x.id}">${x.name} (₹${x.price})</option>`).join('')}
      </select>
      Qty: <input type="number" name="item_qty_${idx}" value="1" min="1" style="width:80px"/>
      Price: <input type="number" step="0.01" name="item_price_${idx}" style="width:120px"/>
    </p>`;
  document.getElementById('items').appendChild(p);
  idx++;
}
addItem()
</script>
{% endblock %}

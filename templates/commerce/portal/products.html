{% extends "commerce/base.html" %}
{% block content %}
<h2>Products</h2>
<div class="row">
  {% for p in products %}
  <div class="card" style="min-width:240px">
    <b>{{ p.name }}</b><br/>
    ₹{{ p.price }}<br/>
    {% if p.photo %}<img src="{{ p.photo.url }}" style="max-width:220px"/>{% endif %}
  </div>
  {% empty %}
  <p>No products available.</p>
  {% endfor %}
</div>
{% endblock %}

<div class="unified-header d-flex justify-content-between align-items-center flex-wrap gap-2">
  <div>
    <h3>{{ title }}</h3>
    {% if subtitle %}<div class="unified-subtitle">{{ subtitle }}</div>{% endif %}
  </div>
  {% if shortcuts %}
  <div class="d-flex gap-2 flex-wrap">
    {% for item in shortcuts %}
    <span class="badge bg-light text-dark">{{ item }}</span>
    {% endfor %}
  </div>
  {% endif %}
</div>

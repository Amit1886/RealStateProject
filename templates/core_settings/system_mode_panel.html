{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
  <div class="card shadow-sm border-0">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4 class="mb-0 fw-bold">System Mode Control Panel</h4>
      <span class="badge bg-dark">Admin Super Control</span>
    </div>
    <div class="card-body">
      {% if messages %}
      <div class="mb-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mb-2">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label fw-bold">Current Mode</label>
          <select name="current_mode" class="form-select" required>
            {% for key, label in mode_choices %}
            <option value="{{ key }}" {% if mode_obj.current_mode == key %}selected{% endif %}>
              {{ key }} - {{ label }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold d-block">Global Lock</label>
          <div class="form-check form-switch mt-2">
            <input class="form-check-input" type="checkbox" name="is_locked" id="isLocked" {% if mode_obj.is_locked %}checked{% endif %}>
            <label class="form-check-label" for="isLocked">Lock mode for all users</label>
          </div>
        </div>

        <div class="col-12 d-flex justify-content-end gap-2">
          <a href="{% url 'core_settings:dashboard' %}" class="btn btn-outline-secondary">Back</a>
          <button type="submit" class="btn btn-success">Apply Mode</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Universal POS</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --ink: #1b1f24;
            --panel: #ffffff;
            --brand: #0d7a64;
            --accent: #f1b24a;
        }
        body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: linear-gradient(120deg, #f4f1ea, #e8f3ef); color: var(--ink); }
        .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; padding: 12px; }
        .panel { background: var(--panel); border-radius: 12px; padding: 12px; box-shadow: 0 6px 18px rgba(0,0,0,.08); }
        .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { border: 0; border-radius: 8px; padding: 10px 12px; background: var(--brand); color: #fff; cursor: pointer; }
        .btn.alt { background: var(--accent); color: #111; }
        .line-items { min-height: 260px; border: 1px dashed #cfd6dc; border-radius: 8px; padding: 8px; }
        .total { font-size: 22px; font-weight: 700; }
        @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }
        @media (max-width: 640px) { .btn { flex: 1 1 48%; } }
    </style>
</head>
<body>
    <div class="layout">
        <section class="panel">
            <h2>POS Billing</h2>
            <input id="barcode-input" placeholder="Scan barcode / QR" style="width:100%;padding:10px;margin-bottom:8px;">
            <div class="toolbar">
                <button class="btn" data-shortcut="F1">F1 Add Item</button>
                <button class="btn" data-shortcut="F2">F2 Qty</button>
                <button class="btn" data-shortcut="F3">F3 Discount</button>
                <button class="btn" data-shortcut="F4">F4 Customer</button>
                <button class="btn alt" data-shortcut="F5">F5 Hold</button>
                <button class="btn alt" data-shortcut="F6">F6 Retrieve</button>
                <button class="btn" data-shortcut="F7">F7 Payment</button>
                <button class="btn" data-shortcut="F8">F8 Print</button>
                <button class="btn" data-shortcut="F9">F9 Reprint</button>
            </div>
            <div class="line-items" id="line-items"></div>
        </section>

        <aside class="panel">
            <h3>Summary</h3>
            <div class="total" id="total">Total: 0.00</div>
            <p>Offline fallback uses localStorage queue.</p>
            <button class="btn" id="sync-btn">Sync Pending Bills</button>
        </aside>
    </div>

    <audio id="scan-sound" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQQAAAAA"></audio>
    <script src="{% static 'js/scanner.js' %}"></script>
    <script>
        window.POSScanner.init({
            inputId: "barcode-input",
            lineItemsId: "line-items",
            totalId: "total",
            soundId: "scan-sound",
        });
    </script>
</body>
</html>

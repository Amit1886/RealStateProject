{% extends "printer/_base_print.html" %}
{% block print_body %}
<table>
  <thead><tr><th>Item</th><th>Qty</th><th>Unit</th></tr></thead>
  <tbody>
    {% for item in items %}
    <tr><td>{{ item.name|default:'-' }}</td><td>{{ item.qty|default:1 }}</td><td>{{ item.unit|default:'Nos' }}</td></tr>
    {% empty %}
    <tr><td colspan="3">No delivery items.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

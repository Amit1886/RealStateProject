{% extends "printer/_base_print.html" %}
{% block print_body %}
<table>
  <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
  <tbody>
    {% for item in items %}
    <tr><td>{{ item.name|default:'-' }}</td><td>{{ item.qty|default:1 }}</td><td>{{ item.rate|default:'0.00' }}</td><td>{{ item.amount|default:'0.00' }}</td></tr>
    {% empty %}
    <tr><td colspan="4">No estimate items.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

{% extends "printer/_base_print.html" %}
{% block print_body %}
<table>
  <thead><tr><th>Description</th><th>Amount</th></tr></thead>
  <tbody>
    {% for item in items %}
    <tr><td>{{ item.name|default:item.description|default:'-' }}</td><td>{{ item.amount|default:'0.00' }}</td></tr>
    {% empty %}
    <tr><td colspan="2">No lines</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

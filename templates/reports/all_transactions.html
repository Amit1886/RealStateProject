{% extends 'base.html' %}
{% block title %}All Transactions{% endblock %}

{% block content %}
<h2>All Transactions</h2>

<table>
    <tr>
        <th>Date</th>
        <th>Party</th>
        <th>Type</th>
        <th>Amount</th>
    </tr>
    {% for t in transactions %}
    <tr>
        <td>{{ t.date }}</td>
        <td>{{ t.party }}</td>
        <td>{{ t.voucher_type }}</td>
        <td>{{ t.amount }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No data</td></tr>
    {% endfor %}
</table>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Day Book{% endblock %}

{% block content %}
<h2>Day Book ({{ date }})</h2>

<table>
    <tr>
        <th>Party</th>
        <th>Amount</th>
    </tr>
    {% for t in transactions %}
    <tr>
        <td>{{ t.party }}</td>
        <td>{{ t.amount }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

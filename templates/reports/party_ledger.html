{% extends 'base.html' %}
{% block title %}Party Ledger{% endblock %}

{% block content %}
<h2>Party Ledger</h2>

<form method="get">
    <select name="party">
        {% for p in parties %}
        <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
    </select>
    <button type="submit">View</button>
</form>

<table>
    <tr>
        <th>Date</th>
        <th>Narration</th>
        <th>Amount</th>
    </tr>
    {% for t in transactions %}
    <tr>
        <td>{{ t.date }}</td>
        <td>{{ t.narration }}</td>
        <td>{{ t.amount }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

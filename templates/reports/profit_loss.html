{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-2 unified-list-screen" data-export-scope>
  <div class="unified-list-card">
    <div class="unified-list-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h3>Profit &amp; Loss</h3>
        <div class="unified-subtitle">Income vs expense summary</div>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <button type="button" class="btn unified-btn-outline" data-export="print" data-export-table="#plTable" data-export-name="profit_loss">Print</button>
        <button type="button" class="btn unified-btn-outline" data-export="excel" data-export-table="#plTable" data-export-name="profit_loss">Excel</button>
        <button type="button" class="btn unified-btn-outline" data-export="pdf" data-export-table="#plTable">PDF</button>
      </div>
    </div>

    <div class="unified-list-body">
      <form class="unified-filter-row d-flex flex-wrap gap-2 align-items-end mb-2" method="get">
        <div style="min-width:160px;">
          <label class="unified-label" for="fromDate">From</label>
          <input id="fromDate" name="from" type="date" class="form-control" value="{{ date_from|date:'Y-m-d' }}">
        </div>
        <div style="min-width:160px;">
          <label class="unified-label" for="toDate">To</label>
          <input id="toDate" name="to" type="date" class="form-control" value="{{ date_to|date:'Y-m-d' }}">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn unified-btn-primary">Apply</button>
          <a href="{% url 'reports:profit_loss' %}" class="btn unified-btn-outline">Reset</a>
        </div>
      </form>

      <div class="unified-table-wrap">
        <table class="table unified-table" id="plTable">
          <thead>
            <tr>
              <th>Particular</th>
              <th class="text-end">Amount</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="fw-semibold">Income</td>
              <td class="text-end fw-bold">&#8377; {{ income }}</td>
            </tr>
            <tr>
              <td class="fw-semibold">Expense</td>
              <td class="text-end fw-bold">&#8377; {{ expense }}</td>
            </tr>
            <tr>
              <td class="fw-semibold">Profit</td>
              <td class="text-end fw-bold">&#8377; {{ profit }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}

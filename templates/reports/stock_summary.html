{% extends 'base.html' %}
{% block title %}Stock Summary{% endblock %}

{% block content %}
<h2>Stock Summary</h2>

<table>
    <tr>
        <th>Product</th>
        <th>Stock</th>
    </tr>
    {% for p in products %}
    <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.stock|default:"0" }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

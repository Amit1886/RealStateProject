<!DOCTYPE html>
<html>
<head>

<title>WhatsApp Setup</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

.qr-box img{
width:300px;
border:4px solid #25D366;
padding:10px;
}

.status{
margin-top:20px;
font-weight:bold;
}

button{
padding:10px 20px;
background:#25D366;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h2>WhatsApp Setup Wizard</h2>

<div class="qr-box">
<img id="qrImage">
</div>

<div class="status" id="statusText">
Loading...
</div>

<button onclick="reconnect()">Reconnect</button>


<script>

function loadQR(){

fetch("/whatsapp/api/qr/")
.then(res=>res.json())
.then(data=>{

if(data.qr){
document.getElementById("qrImage").src = data.qr
}

})

}


function checkStatus(){

fetch("/whatsapp/api/status/")
.then(res=>res.json())
.then(data=>{

document.getElementById("statusText").innerText =
"Status : " + data.status

})

}

function reconnect(){

fetch("/whatsapp/api/reconnect/")
.then(()=>{

alert("Reconnecting...")

})

}

setInterval(loadQR,3000)
setInterval(checkStatus,5000)

</script>

</body>
</html>
